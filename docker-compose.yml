services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  rag-api:
    build: ./rag-api
    container_name: rag-api
    restart: unless-stopped
    ports:
      - "${RAG_API_PORT:-8000}:8000"
    volumes:
      - ./docs:/data/docs:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gemma3:4b}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-documents}
    depends_on:
      - ollama
      - qdrant

  searxng:
    image: searxng/searxng:2026.4.16-ae0b0e56a
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8088}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8088}

  ollama:
    image: ollama/ollama:0.20.7
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      # Ollama connection (internal Docker network — do not change)
      - OLLAMA_BASE_URL=http://ollama:11434

      # UI
      - WEBUI_NAME=${WEBUI_NAME:-Local AI}
      - WEBUI_URL=${WEBUI_URL:-http://localhost:3000}

      # Auth
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}

      # Features
      - ENABLE_MESSAGE_RATING=${ENABLE_MESSAGE_RATING:-true}
      - ENABLE_COMMUNITY_SHARING=${ENABLE_COMMUNITY_SHARING:-false}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-true}

      # Web search engine (SearXNG on internal Docker network)
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json

      # Models
      - DEFAULT_MODELS=${DEFAULT_MODEL:-gemma3:4b}

      # RAG API (OpenAI-compatible connection — auto-registers 'rag' model)
      - OPENAI_API_BASE_URLS=http://rag-api:8000/v1
      - OPENAI_API_KEYS=local
    depends_on:
      - ollama
      - searxng
      - rag-api

volumes:
  ollama_data:
  open_webui_data:
  qdrant_data:
